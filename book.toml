[book]
title = "葱喵Bot手册"
description = "一段关于葱喵bot的奇妙冒险......"
authors = ["TenonSuzu"]
language = "zh-CN"
multilingual = false
src = "src"

[preprocessor]

[preprocessor.catppuccin]
assets_version = "2.1.0" # DO NOT EDIT: Managed by `mdbook-catppuccin install`

[preprocessor.admonish]
command = "mdbook-admonish"
assets_version = "3.0.0" # do not edit: managed by `mdbook-admonish install`

[output]

[output.html]
additional-css = ["./theme/catppuccin.css", "./theme/catppuccin-admonish.css", "./theme/mdbook-admonish.css",]
default-theme = "Macchiato"
preferred-dark-theme = "mocha"
no-section-label = true
git-repository-url = "https://github.com/YoisakiKnd/yoisakiknd.github.io"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/YoisakiKnd/yoisakiknd.github.io/edit/main/{path}"