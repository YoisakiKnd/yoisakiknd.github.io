
name: 部署文档

on:
  push:
    branches:
      # 确保这是你正在使用的分支名称
      - master

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          # 如果你文档需要 Git 子模块，取消注释下一行
          # submodules: true



      - name: 设置 rust环境
        uses: hecrj/setup-rust-action@v2
      - name: 设置mdbook环境
        run: cargo install mdbook --locked&&cargo install mdbook-catppuccin --locked&&export PATH=$PATH:$home/.cargo/bi
      - name: 编译文档
        run: mdbook build
      - name: 部署文档
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # 这是文档部署到的分支名称
          branch: gh-pages
          folder: book/
